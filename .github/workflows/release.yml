name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'cclient.slnx', 'src/**/*.csproj', 'test/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore cclient.slnx

      - name: Run Tests
        run: dotnet test --solution cclient.slnx --configuration Release --no-restore

  build:
    name: Build ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            artifact: cclient-${{ github.ref_name }}-win-x64.zip
          - runtime: win-arm64
            artifact: cclient-${{ github.ref_name }}-win-arm64.zip
          - runtime: linux-x64
            artifact: cclient-${{ github.ref_name }}-linux-x64.tar.gz
          - runtime: linux-arm64
            artifact: cclient-${{ github.ref_name }}-linux-arm64.tar.gz
          - runtime: osx-x64
            artifact: cclient-${{ github.ref_name }}-osx-x64.tar.gz
          - runtime: osx-arm64
            artifact: cclient-${{ github.ref_name }}-osx-arm64.tar.gz

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'cclient.slnx', 'src/**/*.csproj', 'test/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore src/cClient/cClient.csproj --runtime "${{ matrix.runtime }}"

      - name: Build Application
        shell: bash
        run: |
          dotnet publish src/cClient/cClient.csproj \
            --configuration Release \
            --runtime "${{ matrix.runtime }}" \
            --no-restore \
            --self-contained false \
            /p:PublishSingleFile=true \
            /p:PublishReadyToRun=false \
            --output "artifacts/${{ matrix.runtime }}"

      - name: Package Artifact
        shell: bash
        run: |
          cd "artifacts/${{ matrix.runtime }}"
          if [[ "${{ matrix.artifact }}" == *.zip ]]; then
            zip -r "../${{ matrix.artifact }}" .
          elif [[ "${{ matrix.artifact }}" == *.tar.gz ]]; then
            tar -czf "../${{ matrix.artifact }}" .
          else
            echo "Unsupported artifact format: ${{ matrix.artifact }}" >&2
            exit 1
          fi

      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.runtime }}
          path: artifacts/${{ matrix.artifact }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Packaged Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
